
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MysticGames</title>
    <link rel="icon" type="image/png" sizes="48x48" href="/images/Logo.png">
    <link rel="apple-touch-icon" href="/images/Logo.png">
    <meta name="theme-color" content="#6c5ce7">
    <link rel="shortcut icon" href="./images/" type="image/x-icon">
    <link rel="stylesheet" href="./CSS/normalize.css">
    <link rel="stylesheet" href="./CSS/estilos.css">
</head>
<body>




<header class="hero hero--cart">
 <nav class="nav container">
   
    <div class="nav_brand">
        <img src="images/Logo.png" class="logo_img">
        <h2 class="brand_title">
        <span>Bienvenidos</span>
        <span>a</span>
        <span>MysticGames</span>
        </h2>
    </div>

    <ul class="nav_link nav_link--menu">
        <li class="nav_items">
            <a href="index.html" class="nav_links">Inicio</a>
        </li>
         <li class="nav_items">
            <a href="Catalogo.html" class="nav_links">Catálogo</a>
        </li>
         <li class="nav_items">
            <a href="carrito.html" class="nav_links">Carrito</a>
        </li>
         <li class="nav_items">
            <a href="Contacto.html" class="nav_links">Contacto</a>
        </li>

        <img src="./images/Close.png" class="nav_close">
    </ul>

    <div class="nav_menu">
        <img src="./images/menu.png" class="nav_img">
    </div>
 </nav>

 <section class="page-section cart-layout">
   <div class="card card--soft cart-list">
     <h2>Tu carrito</h2>
     <div id="cart-items"></div>
   </div>
   <div class="card card--soft cart-summary">
     <h3>Total</h3>
     <p><strong><span id="cart-total">$0</span></strong></p>
     <button id="btnComprar" class="btn btn-primary">Finalizar compra</button>
   </div>
 </section>

</header>

<section id="checkout-form" class="card card--soft checkout-card">
  <h3>Datos del cliente</h3>
  <form id="formDatos">
    <div class="form-grid">
      <div class="form-group">
        <label for="cf-name">Nombre y apellido</label>
        <input id="cf-name" name="name" type="text" required>
      </div>
      <div class="form-group">
        <label for="cf-contact">Contacto (email o teléfono)</label>
        <input id="cf-contact" name="contact" type="text" required>
      </div>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label for="cf-address">Dirección de envío</label>
      <input id="cf-address" name="address" type="text" required>
    </div>
    <div class="actions">
      <button type="button" id="cf-cancel" class="btn btn-secondary" style="flex:1;">Cancelar</button>
      <button type="submit" id="cf-submit" class="btn btn-primary" style="flex:1;">Continuar al pago</button>
    </div>
  </form>
</section>
   


<script src="./js/config.js"></script>
<script src="./js/precio.js"></script>
<script src="./js/cart.js"></script>

</body>
</html>
